<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #111827;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 30px;
            text-align: center;
            color: #111827;
        }

        .subtitle {
            margin: 0 0 24px;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 700;
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
        }

        button:hover { background: #1d4ed8; }
        button:active { transform: scale(0.99); }
        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .message {
            margin-top: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            white-space: pre-wrap;
        }

        .message.success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Вход</h1>
    <p class="subtitle">Войди в аккаунт музыкального сервиса</p>

    <form id="signinForm">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="example@mail.com" required />
        </div>

        <div class="field">
            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <button id="submitBtn" type="submit">Войти</button>
    </form>

    <div id="message" class="message"></div>

    <div class="footer">
        Нет аккаунта? <a href="/signup.html">Зарегистрироваться</a>
    </div>
</div>

<script>
    const form = document.getElementById('signinForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('message');

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        submitBtn.disabled = true;
        showMessage('Отправка запроса...', 'success');

        try {
            const response = await fetch('/sign-in', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                showMessage(data.message || 'Ошибка входа', 'error');
                return;
            }

            if (data.accessToken) {
                localStorage.setItem('accessToken', data.accessToken);
            }
            if (data.refreshToken) {
                localStorage.setItem('refreshToken', data.refreshToken);
            }

            showMessage('Вход выполнен успешно. Токены сохранены в localStorage.', 'success');
            form.reset();
        } catch (error) {
            showMessage('Не удалось подключиться к серверу: ' + error.message, 'error');
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
