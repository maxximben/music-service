<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Музыкальный плеер — Детальный просмотр трека</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #121212 100%);
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* карточка плеера */
        .music-card {
            max-width: 720px;
            width: 100%;
            background: rgba(30, 30, 35, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        /* верхняя секция с обложкой и базовой инфой */
        .hero {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            padding: 32px 32px 24px 32px;
            background: rgba(20, 20, 25, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cover-wrapper {
            flex-shrink: 0;
            width: 180px;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.5);
            background: #1e1e2a;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .cover-img:hover {
            transform: scale(1.02);
        }

        .track-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .track-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #c0e0ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .track-artist {
            font-size: 1.25rem;
            font-weight: 500;
            color: #b0b0c0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .artist-icon {
            font-size: 1.2rem;
        }

        .track-meta {
            display: flex;
            gap: 20px;
            margin-top: 6px;
            font-size: 0.9rem;
            color: #9a9aae;
        }

        .duration-badge {
            background: rgba(29, 185, 84, 0.15);
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1db954;
            backdrop-filter: blur(2px);
        }

        .song-id-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        /* секция управления и плеера */
        .player-section {
            padding: 24px 32px 32px 32px;
        }

        .id-control {
            display: flex;
            gap: 14px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .id-input-group {
            flex: 2;
            min-width: 180px;
        }

        .id-input {
            width: 100%;
            background: #1e1e28;
            border: 1px solid #33333f;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #fff;
            font-weight: 500;
            transition: all 0.2s;
            outline: none;
        }

        .id-input:focus {
            border-color: #1db954;
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.3);
        }

        button {
            background: #1db954;
            border: none;
            border-radius: 60px;
            padding: 0 28px;
            font-weight: 600;
            font-size: 1rem;
            color: #000000;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        button:hover {
            background: #1ed760;
            transform: scale(0.97);
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
        }

        button:active {
            transform: scale(0.96);
        }

        .load-btn {
            background: #2c2c38;
            color: #e0e0e0;
            border: 1px solid #40404e;
        }

        .load-btn:hover {
            background: #3a3a48;
            border-color: #5a5a70;
            transform: none;
            box-shadow: none;
        }

        /* аудио плеер */
        audio {
            width: 100%;
            margin: 18px 0 20px 0;
            border-radius: 60px;
            background: #1a1a24;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        audio::-webkit-media-controls-panel {
            background-color: #252530;
        }

        /* статус и сообщения */
        .status-area {
            text-align: center;
            font-size: 0.85rem;
            color: #aaaabb;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 60px;
            margin-top: 16px;
            transition: 0.2s;
        }

        .error-status {
            color: #ff8a8a;
            background: rgba(255, 70, 70, 0.1);
            border-left: 3px solid #ff5555;
        }

        .success-status {
            color: #1db954;
        }

        /* спиннер */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #1db954;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        hr {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 16px 0 8px;
        }

        @media (max-width: 550px) {
            .hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .track-info {
                align-items: center;
            }
            .track-meta {
                justify-content: center;
            }
            .cover-wrapper {
                width: 160px;
                height: 160px;
            }
            .track-title {
                font-size: 1.6rem;
            }
            .player-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="music-card" id="app">
    <div class="hero" id="heroArea">
        <div class="cover-wrapper">
            <img class="cover-img" id="coverImage" src="https://picsum.photos/seed/placeholder/300/300?grayscale" alt="Обложка трека">
        </div>
        <div class="track-info">
            <div class="track-title" id="songTitle">—</div>
            <div class="track-artist">
                <span class="artist-icon">🎤</span>
                <span id="artistName">Неизвестный исполнитель</span>
            </div>
            <div class="track-meta">
                <span class="duration-badge" id="durationDisplay">— / —</span>
                <span class="song-id-badge" id="songIdBadge">ID: —</span>
            </div>
        </div>
    </div>

    <div class="player-section">
        <div class="id-control">
            <div class="id-input-group">
                <input type="number" id="trackIdInput" class="id-input" placeholder="Введите ID трека" value="1" min="1">
            </div>
            <button id="loadTrackBtn" class="load-btn">🔍 Загрузить трек</button>
        </div>

        <audio id="audioPlayer" controls preload="metadata"></audio>

        <div id="statusMessage" class="status-area">
            🎵 Введите ID и нажмите «Загрузить трек»
        </div>
        <hr>
        <div style="font-size: 0.7rem; text-align: center; opacity: 0.5; margin-top: 12px;">
            🎧 Данные получаются через /song?id=... | Аудиопоток из поля "url"
        </div>
    </div>
</div>

<script>
    // DOM элементы
    const trackIdInput = document.getElementById('trackIdInput');
    const loadBtn = document.getElementById('loadTrackBtn');
    const audioPlayer = document.getElementById('audioPlayer');
    const statusDiv = document.getElementById('statusMessage');

    // элементы для отображения метаданных
    const coverImg = document.getElementById('coverImage');
    const songTitleSpan = document.getElementById('songTitle');
    const artistNameSpan = document.getElementById('artistName');
    const durationDisplaySpan = document.getElementById('durationDisplay');
    const songIdBadgeSpan = document.getElementById('songIdBadge');

    // вспомогательная функция форматирования длительности (сек -> mm:ss)
    function formatDuration(seconds) {
        if (!seconds && seconds !== 0) return '00:00';
        const secNum = parseInt(seconds, 10);
        if (isNaN(secNum)) return '00:00';
        const minutes = Math.floor(secNum / 60);
        const remainingSecs = secNum % 60;
        return `${minutes.toString().padStart(2, '0')}:${remainingSecs.toString().padStart(2, '0')}`;
    }

    // отображение состояния загрузки
    function setStatus(text, isError = false, isSuccess = false) {
        statusDiv.textContent = text;
        statusDiv.classList.remove('error-status', 'success-status');
        if (isError) {
            statusDiv.classList.add('error-status');
        } else if (isSuccess) {
            statusDiv.classList.add('success-status');
        } else {
            // обычный статус (информационный)
        }
    }

    // отобразить спиннер в статусе
    let loadingTimeout = null;
    function showLoadingStatus(message) {
        setStatus(`⏳ ${message}`, false);
        // добавим спиннер через дополнительный элемент, но просто текст
        // можно улучшить — добавить иконку
        const spinnerSpan = document.createElement('span');
        spinnerSpan.className = 'spinner';
        spinnerSpan.style.display = 'inline-block';
        // но чтобы не плодить, проще поставить текст с эмодзи
        if (!statusDiv.innerHTML.includes('⟳')) {
            // аккуратно, чтоб не сломать
            statusDiv.innerHTML = `⟳ ${message}`;
        } else {
            setStatus(`⟳ ${message}`);
        }
    }

    function resetLoadingStatus() {
        // убираем кастомные элементы, если есть
        if (statusDiv.innerHTML.includes('⟳')) {
            // просто оставим как есть, потом обновится
        }
    }

    // основная функция загрузки трека по ID
    async function loadTrackById(trackId) {
        const id = parseInt(trackId, 10);
        if (isNaN(id) || id < 1) {
            setStatus('❌ Некорректный ID трека (должен быть числом ≥ 1)', true);
            return false;
        }

        // показать загрузку
        setStatus(`🔎 Запрос информации о треке #${id}...`, false);

        try {
            // вызов SongController — endpoint /song?id=...
            const songResponse = await fetch(`/song?id=${id}`);

            if (!songResponse.ok) {
                let errorText = `Ошибка сервера (${songResponse.status})`;
                if (songResponse.status === 404) {
                    errorText = `Трек с ID ${id} не найден на сервере`;
                } else if (songResponse.status === 400) {
                    errorText = `Неверный запрос: возможно, ID отсутствует`;
                }
                throw new Error(errorText);
            }

            const songData = await songResponse.json();

            // валидация обязательных полей (по аналогии с response.json)
            if (!songData.title && !songData.author && !songData.url) {
                throw new Error('Получены неполные данные о треке');
            }

            // обновляем UI метаданными
            songTitleSpan.textContent = songData.title || 'Без названия';
            artistNameSpan.textContent = songData.author || 'Неизвестный исполнитель';
            songIdBadgeSpan.textContent = `ID: ${songData.songId ?? id}`;

            // обложка: если поле cover существует и не пусто, иначе заглушка
            if (songData.cover && songData.cover.trim() !== '') {
                coverImg.src = songData.cover;
                coverImg.alt = `Обложка: ${songData.title}`;
            } else {
                // fallback красивая картинка по умолчанию
                coverImg.src = `https://picsum.photos/seed/${songData.songId || id}/300/300?random=${id}`;
                coverImg.alt = 'Обложка по умолчанию';
            }

            // отображение длительности
            let durationSec = songData.duration;
            if (durationSec !== undefined && durationSec !== null) {
                const formatted = formatDuration(durationSec);
                durationDisplaySpan.textContent = `🕒 ${formatted}`;
                // дополнительно можно попробовать установить метаданные аудио, но аудио само прочитает
            } else {
                durationDisplaySpan.textContent = '🕒 Длительность неизвестна';
            }

            // -------- АУДИО ПОТОК ----------
            // ВАЖНО: response.json содержит поле "url" — прямая ссылка на аудиофайл (mp3)
            if (!songData.url || songData.url.trim() === '') {
                throw new Error('Ссылка на аудиофайл отсутствует в ответе сервера');
            }

            const audioUrl = songData.url;
            // сохраняем предыдущий источник, но обновляем
            if (audioPlayer.src !== audioUrl) {
                audioPlayer.src = audioUrl;
                audioPlayer.load(); // сброс и загрузка нового трека
            }

            // успех, статус
            setStatus(`✅ Готово: "${songData.title}" — ${songData.author}. Нажмите play`, false, true);

            // попробуем автоматически воспроизвести (но браузер может блокировать)
            audioPlayer.play().catch(e => {
                console.warn('Автовоспроизведение заблокировано:', e);
                setStatus(`🎵 Трек загружен. Нажмите ▶ чтобы слушать "${songData.title}"`, false);
            });

            return true;

        } catch (error) {
            console.error('Ошибка при загрузке трека:', error);
            setStatus(`⚠️ Ошибка: ${error.message}`, true);
            // сбрасываем аудио плеер при ошибке, чтобы не оставался старый трек
            if (audioPlayer.src) {
                audioPlayer.src = '';
            }
            // опционально сброс отображения обложки на нейтральную
            coverImg.src = 'https://picsum.photos/seed/errorcover/300/300';
            songTitleSpan.textContent = '—';
            artistNameSpan.textContent = 'Неизвестный исполнитель';
            durationDisplaySpan.textContent = '— / —';
            songIdBadgeSpan.textContent = 'ID: —';
            return false;
        }
    }

    // обработчик кнопки загрузки
    function onLoadClick() {
        const rawId = trackIdInput.value.trim();
        if (rawId === '') {
            setStatus('Введите ID трека (целое число)', true);
            return;
        }
        const idNumber = parseInt(rawId, 10);
        if (isNaN(idNumber) || idNumber < 1) {
            setStatus('ID должен быть положительным числом (1, 2, 3...)', true);
            return;
        }
        loadTrackById(idNumber);
    }

    // событие Enter в поле ввода
    trackIdInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            onLoadClick();
        }
    });

    loadBtn.addEventListener('click', onLoadClick);

    // опционально: при загрузке страницы подтянуть трек с ID=1 (демонстрация)
    window.addEventListener('DOMContentLoaded', () => {
        // загрузим трек по умолчанию (ID 1)
        loadTrackById(1).catch(err => console.warn('не удалось загрузить трек по умолчанию', err));
    });

    // дополнительный хендлер: если аудио не может проиграться из-за сетевой ошибки
    audioPlayer.addEventListener('error', (e) => {
        console.warn('Audio error:', e);
        setStatus('🔊 Не удалось воспроизвести аудио. Возможно, ссылка недоступна или формат не поддерживается.', true);
    });

    audioPlayer.addEventListener('canplay', () => {
        if (audioPlayer.duration && !isNaN(audioPlayer.duration)) {
            const dur = Math.floor(audioPlayer.duration);
            if (durationDisplaySpan.textContent.includes('Длительность неизвестна') || durationDisplaySpan.textContent === '— / —') {
                durationDisplaySpan.textContent = `🕒 ${formatDuration(dur)}`;
            }
        }
    });
</script>
</body>
</html>
